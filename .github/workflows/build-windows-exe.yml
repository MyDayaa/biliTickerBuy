name: Build Windows EXE

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-exe:
    name: Build Windows x86_64 EXE
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pyinstaller~=6.20.0
          pip install -r requirements.txt

      - name: Build with PyInstaller
        shell: bash
        run: pyinstaller main.spec

      - name: Stage release files
        shell: pwsh
        run: |
          $releaseDir = "release/biliTickerBuy"
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null
          Copy-Item "dist/biliTickerBuy.exe" "$releaseDir/biliTickerBuy.exe"
          Copy-Item "assets/updater/update.bat" "$releaseDir/update.bat"
          Copy-Item "assets/updater/.env.install" "$releaseDir/.env.install"
          Compress-Archive `
            -Path "$releaseDir/biliTickerBuy.exe",
                  "$releaseDir/update.bat",
                  "$releaseDir/.env.install" `
            -DestinationPath "biliTickerBuy_windows_amd64.zip" `
            -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: biliTickerBuy_windows_amd64
          path: biliTickerBuy_windows_amd64.zip
          if-no-files-found: error
